server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy the API to the backend service inside the compose network.
    location /api/ {
        proxy_pass http://backend:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Long cache for fingerprinted assets emitted by Vite.
    location /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Landing page lives at /landing/, served as-is.
    location /landing/ {
        try_files $uri $uri/ /landing/index.html;
    }

    # SPA fallback for the React app.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Basic hardening.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
